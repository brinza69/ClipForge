# Postiz — ONE self-hosted stack per COUNTRY, its outbound traffic routed
# through that country's residential/mobile proxy so a genuinely-localized
# account's API posts stay consistent with where the account was created + logs
# in. Copy this dir per country (or use COMPOSE_PROJECT_NAME + a distinct
# .env/port each), e.g. postiz-ro/, postiz-fr/.
#
# The proxy is applied ONLY to the Postiz app container's egress. It is a
# per-country network-consistency measure for real accounts — NOT device/
# fingerprint spoofing (Postiz posts via TikTok's official OAuth API).
#
# Verify env names against your Postiz version: https://docs.postiz.com/installation/docker-compose

services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    restart: unless-stopped
    environment:
      # ── proxy: this country's residential/mobile egress ──────────────────
      HTTP_PROXY: ${COUNTRY_PROXY}
      HTTPS_PROXY: ${COUNTRY_PROXY}
      NO_PROXY: localhost,127.0.0.1,postiz-postgres,postiz-redis
      # ── core Postiz config (fill per your domain/secrets) ────────────────
      MAIN_URL: ${POSTIZ_URL}
      FRONTEND_URL: ${POSTIZ_URL}
      NEXT_PUBLIC_BACKEND_URL: ${POSTIZ_URL}/api
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgresql://postiz:${DB_PASSWORD}@postiz-postgres:5432/postiz
      REDIS_URL: redis://postiz-redis:6379
      STORAGE_PROVIDER: local
      IS_GENERAL: "true"
    ports:
      - "${POSTIZ_PORT}:5000"
    depends_on:
      - postiz-postgres
      - postiz-redis

  postiz-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postiz
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postiz
    volumes:
      - postgres-data:/var/lib/postgresql/data

  postiz-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
